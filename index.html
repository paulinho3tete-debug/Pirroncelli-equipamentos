<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIRRONCELLI - Gestão de Estoque</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; margin: 0; overflow-x: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #c2ff59; }
        .logo-glow { filter: drop-shadow(0 0 8px rgba(194, 255, 89, 0.3)); }
        
        #pdf-template {
            color: black;
            background: white;
            padding: 40px;
            width: 800px;
            position: absolute;
            left: -9999px;
        }

        .tab-active { color: #c2ff59; border-bottom: 2px solid #c2ff59; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { jsPDF } = window.jspdf;

        const firebaseConfig = {
            apiKey: "AIzaSyAqgLGF-dskUT6v0Esly24ZnkTLXwDcnO8",
            authDomain: "pirroncelli-2e05f.firebaseapp.com",
            projectId: "pirroncelli-2e05f",
            storageBucket: "pirroncelli-2e05f.firebasestorage.app",
            messagingSenderId: "317866260903",
            appId: "1:317866260903:web:a94deac8dd795598835e82",
            measurementId: "G-D4PXQXTS1W"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'pirroncelli-v22';

        const Icons = {
            Logo: () => (
                <svg width="180" height="40" viewBox="0 0 180 40" fill="none" xmlns="http://www.w3.org/2000/svg" className="logo-glow">
                    <path d="M10 10L20 30L30 10" stroke="#c2ff59" strokeWidth="4" strokeLinecap="round"/>
                    <text x="40" y="28" fill="#c2ff59" style={{ font: 'bold 22px Inter', letterSpacing: '-1px' }}>PIRRONCELLI</text>
                </svg>
            ),
            FileText: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
            ),
            Trash: () => (
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            ),
            Edit: () => (
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            ),
            Search: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            ),
            Clock: () => (
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ),
            Calendar: () => (
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ),
            Image: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
            ),
            Info: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            ),
            Package: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
            ),
            Plus: () => (
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            ),
            Upload: () => (
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            ),
            User: () => (
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            )
        };

        const formatDate = (dateStr) => {
            if (!dateStr) return '--/--/----';
            const [y, m, d] = dateStr.split('-');
            return `${d}/${m}/${y}`;
        };

        const App = () => {
            const [user, setUser] = React.useState(null);
            const [view, setView] = React.useState('retirada');
            const [formTab, setFormTab] = React.useState('info');
            const [listMode, setListMode] = React.useState('items');
            
            const [products, setProducts] = React.useState([]);
            const [history, setHistory] = React.useState([]);
            const [kits, setKits] = React.useState([]);
            const [cart, setCart] = React.useState([]);
            
            const [search, setSearch] = React.useState('');
            const [stockSearch, setStockSearch] = React.useState('');
            const [kitViewSearch, setKitViewSearch] = React.useState('');
            
            const today = new Date().toISOString().split('T')[0];
            const [orderData, setOrderData] = React.useState({ 
                projeto: '', trabalho: '', responsavel: '', dataRetirada: today, dataVolta: today, imagemRef: '' 
            });
            
            const [isModalOpen, setIsModalOpen] = React.useState(false);
            const [editingId, setEditingId] = React.useState(null);
            const [formData, setFormData] = React.useState({ code: '', name: '', totalQuantity: 1 });
            
            const [isKitModalOpen, setIsKitModalOpen] = React.useState(false);
            const [editingKitId, setEditingKitId] = React.useState(null);
            const [kitFormData, setKitFormData] = React.useState({ name: '', items: [] });
            const [kitSearch, setKitSearch] = React.useState('');

            const [statusMsg, setStatusMsg] = React.useState({ type: '', text: '' });
            const [isGeneratingPdf, setIsGeneratingPdf] = React.useState(false);

            React.useEffect(() => {
                auth.signInAnonymously().catch(e => console.error("Erro Auth:", e));
                return auth.onAuthStateChanged(u => setUser(u));
            }, []);

            React.useEffect(() => {
                if (!user) return;
                const unsubStock = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('inventory')
                    .onSnapshot(s => setProducts(s.docs.map(d => ({ ...d.data(), firebaseId: d.id }))));
                const unsubHistory = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('history')
                    .onSnapshot(s => setHistory(s.docs.map(d => ({ ...d.data(), firebaseId: d.id })).sort((a,b) => b.timestamp - a.timestamp)));
                const unsubKits = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('kits')
                    .onSnapshot(s => setKits(s.docs.map(d => ({ ...d.data(), firebaseId: d.id }))));
                
                return () => { unsubStock(); unsubHistory(); unsubKits(); };
            }, [user]);

            const showMsg = (type, text) => {
                setStatusMsg({ type, text });
                setTimeout(() => setStatusMsg({ type: '', text: '' }), 4000);
            };

            const handleCSVUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                setStatusMsg({ type: 'info', text: 'Lendo planilha...' });
                
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const text = event.target.result;
                    const rows = text.split('\n');
                    const firstRow = rows[0] || '';
                    const delimiter = firstRow.includes(';') ? ';' : ',';

                    const batch = db.batch();
                    let addedCount = 0;

                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i].trim();
                        if (!row) continue;
                        
                        const regex = new RegExp(`${delimiter}(?=(?:(?:[^"]*"){2})*[^"]*$)`);
                        const cols = row.split(regex);
                        
                        const codigo = (cols[0] || '').replace(/"/g, '').trim();
                        const nome = (cols[1] || '').replace(/"/g, '').trim();
                        const marca = (cols[2] || '').replace(/"/g, '').trim();
                        const modelo = (cols[3] || '').replace(/"/g, '').trim();
                        
                        if (codigo && nome && codigo.startsWith('PIR')) {
                            let nomeFinal = nome;
                            if (marca && marca !== 'NÃO ESPECIFICADO' && marca !== '') nomeFinal += ` - ${marca}`;
                            if (modelo && modelo !== 'NÃO ESPECIFICADO' && modelo !== '') nomeFinal += ` (${modelo})`;

                            const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('inventory').doc();
                            batch.set(docRef, {
                                code: codigo,
                                name: nomeFinal,
                                totalQuantity: 1, 
                                currentQuantity: 1,
                                timestamp: Date.now()
                            });
                            addedCount++;
                        }
                    }
                    
                    if (addedCount > 0) {
                        try {
                            await batch.commit();
                            showMsg('success', `${addedCount} itens importados com sucesso!`);
                        } catch(err) {
                            showMsg('error', 'Erro ao salvar no banco de dados.');
                        }
                    } else {
                        showMsg('error', 'Nenhum item com código "PIR-" encontrado.');
                    }
                    e.target.value = null;
                };
                reader.readAsText(file, 'UTF-8');
            };

            const handleSaveItem = async () => {
                if (!formData.name || !formData.code) return showMsg('error', 'Preencha Nome e Código');
                try {
                    const payload = {
                        ...formData,
                        totalQuantity: parseInt(formData.totalQuantity),
                        timestamp: Date.now()
                    };

                    if (editingId) {
                        const oldItem = products.find(p => p.firebaseId === editingId);
                        const diff = parseInt(formData.totalQuantity) - oldItem.totalQuantity;
                        payload.currentQuantity = Math.max(0, oldItem.currentQuantity + diff);
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('inventory').doc(editingId).update(payload);
                        showMsg('success', 'Item Atualizado!');
                    } else {
                        payload.currentQuantity = parseInt(formData.totalQuantity);
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('inventory').add(payload);
                        showMsg('success', 'Item Criado!');
                    }
                    setIsModalOpen(false);
                    setEditingId(null);
                    setFormData({ code: '', name: '', totalQuantity: 1 });
                } catch (e) { showMsg('error', 'Erro ao salvar'); }
            };

            const handleSaveKit = async () => {
                if (!kitFormData.name || kitFormData.items.length === 0) return showMsg('error', 'Dê um nome e adicione itens ao kit');
                try {
                    const payload = {
                        name: kitFormData.name.toUpperCase(),
                        items: kitFormData.items,
                        timestamp: Date.now()
                    };

                    if (editingKitId) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('kits').doc(editingKitId).update(payload);
                        showMsg('success', 'Kit Atualizado!');
                    } else {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('kits').add(payload);
                        showMsg('success', 'Kit Criado!');
                    }
                    setIsKitModalOpen(false);
                    setEditingKitId(null);
                    setKitFormData({ name: '', items: [] });
                } catch (e) { showMsg('error', 'Erro ao salvar kit'); }
            };

            const addKitToCart = (kit) => {
                let itemsAdded = 0;
                let itemsMissed = 0;
                let newCart = [...cart];

                kit.items.forEach(kitItem => {
                    const prod = products.find(p => p.firebaseId === kitItem.firebaseId);
                    if (prod) {
                        const inCart = newCart.filter(c => c.firebaseId === prod.firebaseId).length;
                        if (prod.currentQuantity - inCart > 0) {
                            newCart.push(prod);
                            itemsAdded++;
                        } else {
                            itemsMissed++;
                        }
                    } else {
                        itemsMissed++;
                    }
                });

                setCart(newCart);
                if (itemsMissed > 0) showMsg('error', `Kit parcial: ${itemsMissed} item(s) sem estoque!`);
                else if (itemsAdded > 0) showMsg('success', `Kit ${kit.name} adicionado!`);
            };

            const handleFinalize = async () => {
                if (!orderData.projeto || !orderData.trabalho || !orderData.responsavel || !cart.length) return showMsg('error', 'Preencha os dados obrigatórios e adicione itens');
                try {
                    const order = {
                        projeto: orderData.projeto.toUpperCase(),
                        trabalho: orderData.trabalho.toUpperCase(),
                        responsavel: orderData.responsavel.toUpperCase(),
                        dataRetirada: orderData.dataRetirada,
                        dataVolta: orderData.dataVolta,
                        imagemRef: orderData.imagemRef,
                        dataRegistro: new Date().toLocaleDateString('pt-BR'),
                        timestamp: Date.now(),
                        items: cart.map(i => ({ name: i.name, code: i.code })),
                        concluido: false
                    };
                    
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('history').add(order);
                    
                    for(const item of cart) {
                        const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('inventory').doc(item.firebaseId);
                        const currentProd = products.find(p => p.firebaseId === item.firebaseId);
                        await ref.update({ currentQuantity: Math.max(0, (currentProd.currentQuantity || 0) - 1) });
                    }
                    
                    setCart([]);
                    setOrderData({ projeto: '', trabalho: '', responsavel: '', dataRetirada: today, dataVolta: today, imagemRef: '' });
                    setFormTab('info');
                    showMsg('success', 'Ordem Registrada!');
                    setView('historico');
                } catch (e) { showMsg('error', 'Erro no processamento'); }
            };

            const handleDeleteOrder = async (id) => {
                if(!confirm('Excluir permanentemente este projeto do histórico?')) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('history').doc(id).delete();
                    showMsg('success', 'Projeto excluído');
                } catch (e) { showMsg('error', 'Erro ao excluir'); }
            };

            const generatePDF = async (order) => {
                setIsGeneratingPdf(true);
                document.getElementById('pdf-title').innerText = order.projeto;
                document.getElementById('pdf-job').innerText = `${order.trabalho} | RESPONSÁVEL: ${order.responsavel || 'NÃO INFORMADO'}`;
                document.getElementById('pdf-times').innerText = `${formatDate(order.dataRetirada)} até ${formatDate(order.dataVolta)}`;
                document.getElementById('pdf-date').innerText = order.dataRegistro;
                
                const list = document.getElementById('pdf-items');
                list.innerHTML = order.items.map(it => `<li style="padding: 6px 0; border-bottom: 1px solid #eee; font-size: 14px; font-family: sans-serif;"><b>•</b> ${it.name} <span style="color: #666; font-size: 12px;">[${it.code}]</span></li>`).join('');

                const imgContainer = document.getElementById('pdf-image');
                if (order.imagemRef) {
                    imgContainer.innerHTML = `<div style="margin-top: 30px;"><p style="font-size: 12px; font-weight: bold; margin-bottom: 10px;">REFERÊNCIA VISUAL:</p><img src="${order.imagemRef}" style="max-width: 100%; border-radius: 8px; border: 1px solid #ddd;"/></div>`;
                } else { imgContainer.innerHTML = ''; }

                setTimeout(async () => {
                    const canvas = await html2canvas(document.getElementById('pdf-template'), { scale: 2, useCORS: true });
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                    pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                    pdf.save(`PIRRONCELLI_${order.projeto.replace(/\s/g, '_')}.pdf`);
                    setIsGeneratingPdf(false);
                }, 600);
            };

            const getCartCount = (id) => cart.filter(i => i.firebaseId === id).length;

            if (!user) return <div className="h-screen bg-black flex items-center justify-center text-[#c2ff59] font-black uppercase tracking-widest animate-pulse">Iniciando Pirroncelli...</div>;

            return (
                <div className="min-h-screen pb-20">
                    <div id="pdf-template">
                        <div style={{ borderBottom: '5px solid black', paddingBottom: '15px', marginBottom: '25px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
                            <div>
                                <h1 style={{ fontSize: '38px', margin: 0, fontWeight: '900', letterSpacing: '-2px' }}>PIRRONCELLI</h1>
                                <p style={{ margin: 0, fontSize: '12px', letterSpacing: '2px', fontWeight: 'bold' }}>GESTAO DE EQUIPAMENTOS</p>
                            </div>
                            <div style={{ textAlign: 'right' }}>
                                <p id="pdf-date" style={{ margin: 0, fontSize: '14px', fontWeight: 'bold' }}></p>
                            </div>
                        </div>
                        <div style={{ marginBottom: '30px', backgroundColor: '#f9f9f9', padding: '20px', borderRadius: '10px' }}>
                            <h2 id="pdf-title" style={{ fontSize: '26px', margin: '0 0 5px 0', textTransform: 'uppercase' }}>PROJETO</h2>
                            <p id="pdf-job" style={{ margin: 0, fontSize: '16px', color: '#444' }}>TRABALHO</p>
                            <p style={{ margin: '15px 0 0 0', fontSize: '14px' }}><b>PERÍODO:</b> <span id="pdf-times"></span></p>
                        </div>
                        <h3 style={{ borderBottom: '2px solid black', paddingBottom: '8px', fontSize: '16px', marginBottom: '15px' }}>LISTA DE SAÍDA</h3>
                        <ul id="pdf-items" style={{ listStyle: 'none', padding: 0 }}></ul>
                        <div id="pdf-image"></div>
                    </div>

                    <header className="p-6 flex flex-col md:flex-row items-center justify-between gap-6 border-b border-white/5 sticky top-0 bg-black/90 backdrop-blur-xl z-50">
                        <Icons.Logo />
                        <div className="flex bg-zinc-900 p-1.5 rounded-2xl border border-white/5 overflow-x-auto">
                            {['retirada', 'historico', 'kits', 'estoque'].map(t => (
                                <button key={t} onClick={() => setView(t)} className={`px-6 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all whitespace-nowrap ${view === t ? 'bg-[#c2ff59] text-black shadow-lg shadow-[#c2ff59]/20' : 'opacity-40 hover:opacity-100 hover:bg-white/5'}`}>
                                    {t === 'retirada' ? 'Nova OD' : t === 'historico' ? 'Projetos' : t === 'kits' ? 'Kits' : 'Estoque'}
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="p-6 max-w-7xl mx-auto">
                        {view === 'retirada' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
                                <div className="flex flex-col h-[calc(100vh-130px)] sticky top-[100px]">
                                    <div className="shrink-0 space-y-6 mb-4">
                                        <div className="flex bg-zinc-900 p-1 rounded-2xl w-fit border border-white/5">
                                            <button onClick={() => setListMode('items')} className={`px-6 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${listMode === 'items' ? 'bg-[#c2ff59]/20 text-[#c2ff59]' : 'opacity-40 hover:opacity-100'}`}>Itens</button>
                                            <button onClick={() => setListMode('kits')} className={`px-6 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${listMode === 'kits' ? 'bg-[#c2ff59]/20 text-[#c2ff59]' : 'opacity-40 hover:opacity-100'}`}>Kits Montados</button>
                                        </div>

                                        <div className="relative group">
                                            <div className="absolute left-4 top-1/2 -translate-y-1/2 opacity-20 group-focus-within:opacity-100 transition-opacity"><Icons.Search /></div>
                                            <input type="text" placeholder={listMode === 'items' ? "BUSCAR EQUIPAMENTO..." : "BUSCAR KIT..."} className="w-full bg-zinc-900/50 border border-white/10 rounded-2xl p-5 pl-12 text-xs font-bold uppercase outline-none focus:border-[#c2ff59] transition-all" value={search} onChange={e => setSearch(e.target.value)} />
                                        </div>
                                    </div>
                                    
                                    <div className="flex-1 overflow-y-auto pr-3 custom-scrollbar space-y-3 pb-4">
                                        {listMode === 'items' ? (
                                            products.filter(p => p.name.toLowerCase().includes(search.toLowerCase())).map(p => {
                                                const available = p.currentQuantity - getCartCount(p.firebaseId);
                                                return (
                                                    <button key={p.firebaseId} disabled={available <= 0} onClick={() => setCart([...cart, p])} className={`w-full p-5 rounded-2xl bg-zinc-900/40 border border-white/5 flex items-center justify-between transition-all group ${available <= 0 ? 'opacity-20 cursor-not-allowed' : 'hover:bg-zinc-900 hover:border-[#c2ff59]/30'}`}>
                                                        <div className="text-left">
                                                            <div className="text-[11px] font-black uppercase tracking-tight">{p.name}</div>
                                                            <div className="text-[9px] opacity-30 font-bold mt-0.5">{p.code}</div>
                                                        </div>
                                                        <div className="text-right">
                                                            <div className={`font-black text-xs ${available <= 0 ? 'text-red-500' : 'text-[#c2ff59]'}`}>{available}</div>
                                                        </div>
                                                    </button>
                                                );
                                            })
                                        ) : (
                                            kits.filter(k => k.name.toLowerCase().includes(search.toLowerCase())).map(k => (
                                                <div key={k.firebaseId} className="w-full p-5 rounded-2xl bg-zinc-900/40 border border-[#c2ff59]/10 transition-all flex flex-col gap-3">
                                                    <div className="flex justify-between items-center">
                                                        <div className="text-[11px] font-black uppercase text-[#c2ff59] flex items-center gap-2"><Icons.Package /> {k.name}</div>
                                                        <button onClick={() => addKitToCart(k)} className="bg-[#c2ff59] text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase hover:scale-105 transition-all">Adicionar Kit Inteiro</button>
                                                    </div>
                                                    <div className="text-[9px] opacity-40 font-bold uppercase flex flex-wrap gap-2">
                                                        {k.items.map((it, idx) => <span key={idx} className="bg-black/50 px-2 py-1 rounded">{it.name}</span>)}
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                        {listMode === 'kits' && kits.length === 0 && <div className="text-[10px] text-center opacity-30 font-black uppercase mt-10">Nenhum kit cadastrado. Vá na aba "Kits" para criar.</div>}
                                    </div>
                                </div>

                                <div className="bg-zinc-900/40 border border-white/5 rounded-[3rem] flex flex-col shadow-2xl overflow-hidden h-[calc(100vh-130px)] sticky top-[100px]">
                                    <div className="flex border-b border-white/5 px-8 pt-6 shrink-0 bg-zinc-900/50">
                                        <button onClick={() => setFormTab('info')} className={`pb-4 px-4 text-[10px] font-black uppercase flex items-center gap-2 transition-all ${formTab === 'info' ? 'tab-active' : 'opacity-30'}`}>
                                            <Icons.Info /> Detalhes do Projeto
                                        </button>
                                        <button onClick={() => setFormTab('media')} className={`pb-4 px-4 text-[10px] font-black uppercase flex items-center gap-2 transition-all ${formTab === 'media' ? 'tab-active' : 'opacity-30'}`}>
                                            <Icons.Image /> Mídia
                                        </button>
                                    </div>

                                    <div className="p-6 md:p-8 space-y-6 flex-1 overflow-y-auto custom-scrollbar">
                                        {formTab === 'info' ? (
                                            <div className="space-y-4">
                                                <input placeholder="NOME DO CLIENTE / PROJETO" className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-[11px] font-bold uppercase outline-none focus:border-[#c2ff59]/50" value={orderData.projeto} onChange={e => setOrderData({...orderData, projeto: e.target.value})} />
                                                <input placeholder="FINALIDADE (EX: COBERTURA, FILMAGEM)" className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-[11px] font-bold uppercase outline-none focus:border-[#c2ff59]/50" value={orderData.trabalho} onChange={e => setOrderData({...orderData, trabalho: e.target.value})} />
                                                <input placeholder="NOME DO RESPONSÁVEL" className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-[11px] font-bold uppercase outline-none focus:border-[#c2ff59]/50" value={orderData.responsavel} onChange={e => setOrderData({...orderData, responsavel: e.target.value})} />

                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="space-y-1.5">
                                                        <label className="text-[9px] font-black opacity-20 ml-3 uppercase flex items-center gap-1"><Icons.Calendar /> Data Retirada</label>
                                                        <input type="date" className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-[11px] font-bold outline-none" value={orderData.dataRetirada} onChange={e => setOrderData({...orderData, dataRetirada: e.target.value})} />
                                                    </div>
                                                    <div className="space-y-1.5">
                                                        <label className="text-[9px] font-black opacity-20 ml-3 uppercase flex items-center gap-1"><Icons.Calendar /> Data Devolução</label>
                                                        <input type="date" className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-[11px] font-bold outline-none" value={orderData.dataVolta} onChange={e => setOrderData({...orderData, dataVolta: e.target.value})} />
                                                    </div>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="space-y-4">
                                                <input placeholder="COLE O LINK DA IMAGEM (URL)" className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-[10px] font-bold outline-none focus:border-[#c2ff59]" value={orderData.imagemRef} onChange={e => setOrderData({...orderData, imagemRef: e.target.value})} />
                                                {orderData.imagemRef && (
                                                    <div className="w-full h-40 rounded-2xl overflow-hidden border border-white/10 bg-black flex-shrink-0">
                                                        <img src={orderData.imagemRef} className="w-full h-full object-contain" />
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        <div className="pt-4 border-t border-white/5">
                                            <div className="flex justify-between items-center mb-4">
                                                <span className="text-[10px] font-black opacity-40 uppercase">Itens na Lista ({cart.length})</span>
                                            </div>
                                            <div className="bg-black/40 rounded-2xl p-4 min-h-[100px] border border-white/5 space-y-2">
                                                {cart.map((c, idx) => (
                                                    <div key={idx} className="flex justify-between items-center py-2 border-b border-white/5 last:border-0 uppercase text-[9px] font-black">
                                                        <span>{c.name}</span>
                                                        <button onClick={() => setCart(cart.filter((_, i) => i !== idx))} className="text-red-500 opacity-40 hover:opacity-100 transition-opacity"><Icons.Trash /></button>
                                                    </div>
                                                ))}
                                                {cart.length === 0 && <div className="text-[10px] opacity-10 text-center py-8 font-black uppercase tracking-widest">Lista Vazia</div>}
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="p-6 md:px-8 md:pb-8 pt-0 shrink-0">
                                        <button onClick={handleFinalize} disabled={!cart.length || !orderData.projeto || !orderData.responsavel} className="w-full bg-[#c2ff59] text-black py-5 rounded-2xl font-black uppercase text-xs disabled:opacity-20 transition-all hover:scale-[1.02]">
                                            Finalizar e Salvar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'kits' && (
                            <div className="space-y-8">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-zinc-900/30 p-8 rounded-[3rem] border border-white/5">
                                    <div className="flex-1 w-full md:w-auto">
                                        <h2 className="text-3xl font-black uppercase tracking-tighter text-[#c2ff59]">Meus Kits</h2>
                                        <p className="text-[10px] opacity-40 font-bold uppercase mt-1 mb-4">Crie pacotes rápidos para acelerar as retiradas</p>
                                        <div className="relative w-full max-w-md">
                                            <div className="absolute left-4 top-1/2 -translate-y-1/2 opacity-20"><Icons.Search /></div>
                                            <input type="text" placeholder="PESQUISAR KITS..." className="w-full bg-black/50 border border-[#c2ff59]/20 rounded-xl p-3 pl-10 text-xs font-bold uppercase outline-none focus:border-[#c2ff59] transition-all" value={kitViewSearch} onChange={e => setKitViewSearch(e.target.value)} />
                                        </div>
                                    </div>
                                    <button onClick={() => { setEditingKitId(null); setKitFormData({name:'', items:[]}); setIsKitModalOpen(true); }} className="bg-[#c2ff59] text-black px-8 py-4 rounded-2xl font-black text-[11px] uppercase hover:scale-105 transition-all w-full md:w-auto">Montar Novo Kit</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {kits.filter(k => k.name.toLowerCase().includes(kitViewSearch.toLowerCase())).map(k => (
                                        <div key={k.firebaseId} className="bg-zinc-900/40 p-8 rounded-[2.5rem] border border-white/5 flex flex-col group hover:border-[#c2ff59]/30 transition-all">
                                            <div className="flex justify-between items-start mb-4">
                                                <div className="text-sm font-black uppercase text-[#c2ff59] flex items-center gap-2"><Icons.Package /> {k.name}</div>
                                            </div>
                                            <div className="space-y-1.5 opacity-60 text-[10px] font-bold uppercase max-h-32 overflow-y-auto custom-scrollbar mb-6">
                                                {k.items.map((it, i) => <div key={i}>• {it.name}</div>)}
                                            </div>
                                            
                                            <div className="mt-auto flex gap-2 pt-4 border-t border-white/5">
                                                <button onClick={() => { setEditingKitId(k.firebaseId); setKitFormData({name: k.name, items: k.items}); setIsKitModalOpen(true); }} className="flex-1 bg-white/5 hover:bg-[#c2ff59] hover:text-black text-white/70 p-3 rounded-xl text-[9px] font-black uppercase transition-all flex items-center justify-center gap-2">
                                                    <Icons.Edit /> Editar Kit
                                                </button>
                                                <button onClick={async () => { if(confirm('Excluir este kit?')) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('kits').doc(k.firebaseId).delete() }} className="p-3 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white rounded-xl transition-all">
                                                    <Icons.Trash />
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                    {kits.length === 0 && <div className="col-span-full py-20 text-center opacity-20 font-black uppercase text-sm tracking-widest">Nenhum kit montado ainda</div>}
                                </div>
                            </div>
                        )}

                        {view === 'historico' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {history.map(h => (
                                    <div key={h.firebaseId} className="group p-8 rounded-[3rem] border bg-zinc-900/60 border-[#c2ff59]/10 hover:border-[#c2ff59]/30 transition-all flex flex-col relative overflow-hidden">
                                        <div className="flex justify-between items-start mb-6">
                                            <div>
                                                <h3 className="font-black uppercase text-base text-[#c2ff59] tracking-tight">{h.projeto}</h3>
                                                <p className="text-[9px] font-bold opacity-40 mt-1 uppercase tracking-wider">{h.trabalho}</p>
                                            </div>
                                            <button onClick={() => handleDeleteOrder(h.firebaseId)} className="p-2.5 bg-red-500/10 text-red-500 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-500 hover:text-white">
                                                <Icons.Trash />
                                            </button>
                                        </div>

                                        <div className="flex flex-wrap items-center gap-3 mb-6">
                                            <div className="flex items-center gap-2 opacity-50 text-[10px] font-black bg-white/5 px-3 py-1.5 rounded-full uppercase">
                                                <Icons.User /> {h.responsavel || 'NÃO INFORMADO'}
                                            </div>
                                            <div className="flex items-center gap-2 opacity-50 text-[10px] font-black bg-white/5 px-3 py-1.5 rounded-full uppercase">
                                                <Icons.Calendar /> {formatDate(h.dataRetirada)} ATÉ {formatDate(h.dataVolta)}
                                            </div>
                                        </div>

                                        {h.imagemRef && (
                                            <div className="w-full h-40 rounded-3xl overflow-hidden mb-6 border border-white/5 bg-black/50">
                                                <img src={h.imagemRef} className="w-full h-full object-cover opacity-80" />
                                            </div>
                                        )}

                                        <div className="text-[10px] space-y-1 mb-8 bg-black/40 p-4 rounded-2xl border border-white/5 max-h-32 overflow-y-auto custom-scrollbar uppercase font-bold opacity-60">
                                            {h.items?.map((it, i) => <div key={i}>• {it.name}</div>)}
                                        </div>

                                        <div className="mt-auto space-y-3">
                                            <button onClick={() => generatePDF(h)} className="w-full bg-white/5 hover:bg-white/10 text-white text-[10px] font-black uppercase p-4 rounded-2xl flex items-center justify-center gap-3 transition-all border border-white/10">
                                                <Icons.FileText /> Baixar PDF
                                            </button>
                                            {!h.concluido && (
                                                <button 
                                                    onClick={async () => {
                                                        if(!confirm('Confirmar devolução?')) return;
                                                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('history').doc(h.firebaseId).update({ concluido: true });
                                                        for(const item of h.items) {
                                                            const prod = products.find(p => p.code === item.code);
                                                            if(prod) {
                                                                const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('inventory').doc(prod.firebaseId);
                                                                await ref.update({ currentQuantity: prod.currentQuantity + 1 });
                                                            }
                                                        }
                                                        showMsg('success', 'Baixa realizada!');
                                                    }}
                                                    className="w-full bg-[#c2ff59] text-black text-[10px] font-black uppercase p-4 rounded-2xl"
                                                >
                                                    Dar Baixa
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'estoque' && (
                            <div className="space-y-8">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-zinc-900/30 p-8 rounded-[3rem] border border-white/5">
                                    <div className="flex-1 w-full md:w-auto">
                                        <h2 className="text-3xl font-black uppercase tracking-tighter">Estoque</h2>
                                        <p className="text-[10px] opacity-30 font-bold uppercase mt-1 mb-4">Gerencie e edite seus ativos</p>
                                        
                                        <div className="relative w-full max-w-md">
                                            <div className="absolute left-4 top-1/2 -translate-y-1/2 opacity-20"><Icons.Search /></div>
                                            <input type="text" placeholder="PESQUISAR ITEM PELO NOME OU CÓDIGO..." className="w-full bg-black/50 border border-white/10 rounded-xl p-3 pl-10 text-xs font-bold uppercase outline-none focus:border-[#c2ff59] transition-all" value={stockSearch} onChange={e => setStockSearch(e.target.value)} />
                                        </div>
                                    </div>
                                    <div className="flex gap-4 w-full md:w-auto overflow-x-auto pb-2 md:pb-0">
                                        <label className="bg-zinc-800 text-white px-6 py-4 rounded-2xl font-black text-[11px] uppercase cursor-pointer hover:bg-zinc-700 transition-all flex items-center gap-2 whitespace-nowrap">
                                            <Icons.Upload /> Importar Planilha
                                            <input type="file" accept=".csv" className="hidden" onChange={handleCSVUpload} />
                                        </label>
                                        <button onClick={() => { setEditingId(null); setFormData({code:'', name:'', totalQuantity:1}); setIsModalOpen(true); }} className="bg-[#c2ff59] text-black px-8 py-4 rounded-2xl font-black text-[11px] uppercase shadow-lg shadow-[#c2ff59]/20 hover:scale-105 transition-all whitespace-nowrap">Adicionar Item</button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-5">
                                    {products.filter(p => p.name.toLowerCase().includes(stockSearch.toLowerCase()) || p.code.toLowerCase().includes(stockSearch.toLowerCase())).map(p => (
                                        <div key={p.firebaseId} className="bg-zinc-900/40 p-6 rounded-[2.5rem] border border-white/5 flex flex-col justify-between group hover:border-[#c2ff59]/30 transition-all">
                                            <div className="text-[11px] font-black uppercase leading-tight mb-4 pr-4">{p.name}</div>
                                            <div className="flex justify-between items-end">
                                                <div className="flex flex-col">
                                                    <span className="text-[8px] font-black opacity-30 uppercase">Qtd</span>
                                                    <div className={`font-black text-base ${p.currentQuantity === 0 ? 'text-red-500' : 'text-[#c2ff59]'}`}>{p.currentQuantity} <span className="opacity-20 text-[9px]">/ {p.totalQuantity}</span></div>
                                                </div>
                                                <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <button onClick={() => { setEditingId(p.firebaseId); setFormData({name:p.name, code:p.code, totalQuantity:p.totalQuantity}); setIsModalOpen(true); }} className="p-2 bg-white/5 rounded-lg text-white/40 hover:text-[#c2ff59] transition-colors"><Icons.Edit /></button>
                                                    <button onClick={async () => { if(confirm('Apagar item?')) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('inventory').doc(p.firebaseId).delete() }} className="p-2 bg-white/5 rounded-lg text-white/40 hover:text-red-500 transition-colors"><Icons.Trash /></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {products.filter(p => p.name.toLowerCase().includes(stockSearch.toLowerCase()) || p.code.toLowerCase().includes(stockSearch.toLowerCase())).length === 0 && (
                                        <div className="col-span-full py-10 text-center opacity-20 font-black uppercase text-sm">Nenhum equipamento encontrado</div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Alertas */}
                    {statusMsg.text && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] px-8 py-4 rounded-2xl border text-[10px] font-black uppercase bg-zinc-900 border-[#c2ff59] text-[#c2ff59] animate-bounce shadow-2xl">
                            {statusMsg.text}
                        </div>
                    )}

                    {/* Modal para iti baro nga item nga addaan scroll */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="bg-zinc-900 border border-white/10 p-8 md:p-10 rounded-[3.5rem] w-full max-w-md space-y-6 max-h-[90vh] overflow-y-auto custom-scrollbar shadow-2xl">
                                <h2 className="text-2xl font-black uppercase text-[#c2ff59]">{editingId ? 'Editar' : 'Novo Item'}</h2>
                                <div className="space-y-4">
                                    <input placeholder="NOME" className="w-full bg-black border border-white/10 p-5 rounded-2xl text-[11px] font-bold uppercase outline-none" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value.toUpperCase()})} />
                                    <input placeholder="PATRIMÔNIO" className="w-full bg-black border border-white/10 p-5 rounded-2xl text-[11px] font-bold uppercase outline-none" value={formData.code} onChange={e => setFormData({...formData, code: e.target.value.toUpperCase()})} />
                                    <input type="number" className="w-full bg-black border border-white/10 p-5 rounded-2xl text-[11px] font-bold outline-none" value={formData.totalQuantity} onChange={e => setFormData({...formData, totalQuantity: e.target.value})} />
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setIsModalOpen(false)} className="flex-1 py-4 bg-zinc-800 rounded-2xl font-black text-[10px] uppercase">Cancelar</button>
                                    <button onClick={handleSaveItem} className="flex-1 py-4 bg-[#c2ff59] text-black rounded-2xl font-black text-[10px] uppercase">Salvar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal para iti Kits nga addaan scroll */}
                    {isKitModalOpen && (
                        <div className="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="bg-zinc-900 border border-[#c2ff59]/20 p-8 md:p-10 rounded-[3.5rem] w-full max-w-4xl space-y-6 max-h-[95vh] overflow-y-auto custom-scrollbar shadow-2xl">
                                <h2 className="text-2xl font-black uppercase text-[#c2ff59]">{editingKitId ? 'Editar Kit' : 'Montar Novo Kit'}</h2>
                                
                                <input placeholder="NOME DO KIT (Ex: KIT LENTES CINE)" className="w-full bg-black border border-white/10 p-5 rounded-2xl text-[12px] font-black uppercase outline-none focus:border-[#c2ff59]" value={kitFormData.name} onChange={e => setKitFormData({...kitFormData, name: e.target.value.toUpperCase()})} />
                                
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 h-[40vh] min-h-[300px]">
                                    <div className="space-y-4 flex flex-col h-full">
                                        <div className="text-[10px] font-black uppercase opacity-40">Estoque Disponível</div>
                                        <input type="text" placeholder="BUSCAR PARA ADICIONAR..." className="w-full bg-black border border-white/10 rounded-xl p-4 text-[10px] font-bold uppercase outline-none" value={kitSearch} onChange={e => setKitSearch(e.target.value)} />
                                        <div className="flex-1 overflow-y-auto space-y-2 custom-scrollbar pr-2">
                                            {products.filter(p => p.name.toLowerCase().includes(kitSearch.toLowerCase())).map(p => (
                                                <button key={p.firebaseId} onClick={() => setKitFormData({...kitFormData, items: [...kitFormData.items, p]})} className="w-full p-4 rounded-xl bg-zinc-800/50 hover:bg-[#c2ff59]/10 border border-transparent hover:border-[#c2ff59]/30 text-left transition-all flex justify-between items-center group">
                                                    <div>
                                                        <div className="text-[10px] font-black uppercase">{p.name}</div>
                                                        <div className="text-[8px] opacity-40 font-bold">{p.code}</div>
                                                    </div>
                                                    <Icons.Plus />
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-4 flex flex-col h-full border-l border-white/5 pl-0 lg:pl-8 mt-6 lg:mt-0">
                                        <div className="text-[10px] font-black uppercase text-[#c2ff59]">Itens neste Kit ({kitFormData.items.length})</div>
                                        <div className="flex-1 overflow-y-auto space-y-2 custom-scrollbar bg-black/50 p-4 rounded-2xl border border-white/5">
                                            {kitFormData.items.map((it, idx) => (
                                                <div key={idx} className="flex justify-between items-center py-2 border-b border-white/5 last:border-0 uppercase text-[9px] font-black">
                                                    <span>{it.name}</span>
                                                    <button onClick={() => {
                                                        const newItems = [...kitFormData.items];
                                                        newItems.splice(idx, 1);
                                                        setKitFormData({...kitFormData, items: newItems});
                                                    }} className="text-red-500 opacity-40 hover:opacity-100 transition-opacity p-2"><Icons.Trash /></button>
                                                </div>
                                            ))}
                                            {kitFormData.items.length === 0 && <div className="text-[10px] opacity-20 text-center py-10 font-bold">Nenhum item adicionado</div>}
                                        </div>
                                    </div>
                                </div>

                                <div className="flex gap-3 pt-4">
                                    <button onClick={() => setIsKitModalOpen(false)} className="flex-1 py-5 bg-zinc-800 rounded-2xl font-black text-[10px] uppercase hover:bg-zinc-700 transition-all">Cancelar</button>
                                    <button onClick={handleSaveKit} className="flex-1 py-5 bg-[#c2ff59] text-black rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-[#c2ff59]/10">Salvar Kit</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
