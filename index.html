<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PIRRONCELLI - Gestão de Estoque</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: white; 
            margin: 0; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        .glass-panel {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .active-tab-mobile {
            color: #c2ff59;
            position: relative;
        }
        .active-tab-mobile::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: #c2ff59;
            border-radius: 50%;
        }

        @media (max-width: 768px) {
            .main-content { padding-bottom: 100px; }
            .sticky-form { position: relative !important; top: 0 !important; height: auto !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { jsPDF } = window.jspdf;

        const firebaseConfig = {
            apiKey: "AIzaSyAqgLGF-dskUT6v0Esly24ZnkTLXwDcnO8",
            authDomain: "pirroncelli-2e05f.firebaseapp.com",
            projectId: "pirroncelli-2e05f",
            storageBucket: "pirroncelli-2e05f.firebasestorage.app",
            messagingSenderId: "317866260903",
            appId: "1:317866260903:web:a94deac8dd795598835e82",
            measurementId: "G-D4PXQXTS1W"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'pirroncelli-v22';

        const Icons = {
            Logo: () => (
                <svg width="150" height="30" viewBox="0 0 180 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 10L20 30L30 10" stroke="#c2ff59" strokeWidth="5" strokeLinecap="round"/>
                    <text x="40" y="28" fill="#c2ff59" style={{ font: '900 24px Inter', letterSpacing: '-1px' }}>PIRRONCELLI</text>
                </svg>
            ),
            Plus: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14"/></svg>,
            History: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5M12 7v5l4 2"/></svg>,
            Box: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5M12 22V12"/></svg>,
            Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
            Search: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            Download: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        };

        const formatDate = (dateStr) => {
            if (!dateStr) return '--/--/----';
            const [y, m, d] = dateStr.split('-');
            return `${d}/${m}/${y}`;
        };

        const App = () => {
            const [user, setUser] = React.useState(null);
            const [view, setView] = React.useState('retirada');
            const [products, setProducts] = React.useState([]);
            const [history, setHistory] = React.useState([]);
            const [cart, setCart] = React.useState([]);
            const [search, setSearch] = React.useState('');
            const [isGeneratingPdf, setIsGeneratingPdf] = React.useState(false);
            
            const today = new Date().toISOString().split('T')[0];
            const [orderData, setOrderData] = React.useState({ 
                projeto: '', responsavel: '', dataRetirada: today, dataVolta: today
            });

            React.useEffect(() => {
                auth.signInAnonymously().catch(e => console.error("Erro Auth:", e));
                return auth.onAuthStateChanged(u => setUser(u));
            }, []);

            React.useEffect(() => {
                if (!user) return;
                const unsubStock = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('inventory')
                    .onSnapshot(s => setProducts(s.docs.map(d => ({ ...d.data(), firebaseId: d.id }))));
                const unsubHistory = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('history')
                    .onSnapshot(s => setHistory(s.docs.map(d => ({ ...d.data(), firebaseId: d.id })).sort((a,b) => b.timestamp - a.timestamp)));
                return () => { unsubStock(); unsubHistory(); };
            }, [user]);

            const handleFinalize = async () => {
                if (!orderData.projeto || !cart.length) return alert('Selecione itens e preencha o projeto.');
                try {
                    const order = {
                        ...orderData,
                        projeto: orderData.projeto.toUpperCase(),
                        dataRegistro: new Date().toLocaleDateString('pt-BR'),
                        timestamp: Date.now(),
                        items: cart.map(i => ({ name: i.name, code: i.code })),
                        concluido: false
                    };
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('history').add(order);
                    for(const item of cart) {
                        const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('inventory').doc(item.firebaseId);
                        const currentProd = products.find(p => p.firebaseId === item.firebaseId);
                        await ref.update({ currentQuantity: Math.max(0, (currentProd.currentQuantity || 0) - 1) });
                    }
                    setCart([]); setOrderData({ projeto: '', responsavel: '', dataRetirada: today, dataVolta: today });
                    setView('historico');
                } catch (e) { alert('Erro ao salvar.'); }
            };

            const generatePDF = async (order) => {
                setIsGeneratingPdf(true);
                const pdf = new jsPDF('p', 'mm', 'a4');
                const margin = 20;
                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();
                let yPos = 25;

                const drawHeader = () => {
                    pdf.setFont('helvetica', 'bold');
                    pdf.setFontSize(26);
                    pdf.setTextColor(0);
                    pdf.text("PIRRONCELLI", margin, yPos);
                    pdf.setFontSize(9);
                    pdf.setTextColor(100);
                    pdf.text("CONTROLE DE SAÍDA DE EQUIPAMENTOS", margin, yPos + 6);
                    yPos += 15;
                    pdf.setDrawColor(200);
                    pdf.line(margin, yPos, pageWidth - margin, yPos);
                    yPos += 12;
                };

                const checkNewPage = (needed) => {
                    if (yPos + needed > pageHeight - 50) { 
                        pdf.addPage(); 
                        yPos = 25; 
                        drawHeader(); 
                    }
                };

                drawHeader();
                
                // Info Box
                pdf.setFillColor(248, 248, 248);
                pdf.rect(margin, yPos, pageWidth - (margin * 2), 35, 'F');
                pdf.setFontSize(11);
                pdf.setTextColor(40);
                pdf.text(`PROJETO: ${order.projeto.toUpperCase()}`, margin + 6, yPos + 10);
                pdf.text(`RESPONSÁVEL: ${order.responsavel.toUpperCase()}`, margin + 6, yPos + 18);
                pdf.text(`DATA SAÍDA: ${formatDate(order.dataRetirada)}   |   VOLTA PREVISTA: ${formatDate(order.dataVolta)}`, margin + 6, yPos + 26);
                yPos += 48;

                // Items
                pdf.setFont('helvetica', 'bold');
                pdf.setFontSize(12);
                pdf.text("LISTA DE EQUIPAMENTOS", margin, yPos);
                yPos += 6;
                pdf.setDrawColor(0);
                pdf.line(margin, yPos, pageWidth - margin, yPos);
                yPos += 10;

                const counts = {};
                order.items.forEach(it => { counts[it.name] = (counts[it.name] || 0) + 1; });

                pdf.setFont('helvetica', 'normal');
                pdf.setFontSize(10);
                Object.entries(counts).forEach(([name, count]) => {
                    checkNewPage(10);
                    pdf.text(`${count}x`, margin, yPos);
                    pdf.text(`${name}`, margin + 12, yPos);
                    yPos += 8;
                });

                // Assinatura (Sempre ao final da lista ou nova página)
                checkNewPage(40);
                yPos += 15;
                pdf.setDrawColor(150);
                pdf.line(margin + 30, yPos, pageWidth - margin - 30, yPos);
                yPos += 6;
                pdf.setFont('helvetica', 'bold');
                pdf.setFontSize(10);
                pdf.text(order.responsavel.toUpperCase(), pageWidth / 2, yPos, { align: 'center' });
                yPos += 4;
                pdf.setFont('helvetica', 'normal');
                pdf.setFontSize(8);
                pdf.setTextColor(120);
                pdf.text("ASSINATURA DO RESPONSÁVEL", pageWidth / 2, yPos, { align: 'center' });

                pdf.save(`PIRRONCELLI_${order.projeto.replace(/\s+/g, '_')}.pdf`);
                setIsGeneratingPdf(false);
            };

            const getCartCount = (id) => cart.filter(i => i.firebaseId === id).length;

            if (!user) return <div className="h-screen flex items-center justify-center bg-black"><Icons.Logo /></div>;

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="hidden md:flex items-center justify-between p-6 glass-panel sticky top-0 z-50">
                        <Icons.Logo />
                        <div className="flex bg-white/5 p-1 rounded-2xl border border-white/5">
                            {['retirada', 'historico', 'estoque'].map(t => (
                                <button key={t} onClick={() => setView(t)} className={`px-6 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${view === t ? 'bg-[#c2ff59] text-black' : 'opacity-40 hover:opacity-100'}`}>
                                    {t === 'retirada' ? 'Nova Saída' : t === 'historico' ? 'Histórico' : 'Estoque'}
                                </button>
                            ))}
                        </div>
                    </header>

                    <div className="md:hidden flex justify-center py-6 border-b border-white/5">
                        <Icons.Logo />
                    </div>

                    <main className="p-4 md:p-8 max-w-7xl mx-auto w-full main-content">
                        {view === 'retirada' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-12">
                                <div className="flex flex-col space-y-4">
                                    <div className="relative group">
                                        <div className="absolute left-4 top-1/2 -translate-y-1/2 opacity-20"><Icons.Search /></div>
                                        <input 
                                            type="text" 
                                            placeholder="BUSCAR EQUIPAMENTO..." 
                                            className="w-full bg-zinc-900 border border-white/10 rounded-2xl p-4 pl-12 text-xs font-bold uppercase outline-none focus:border-[#c2ff59] transition-all"
                                            value={search}
                                            onChange={e => setSearch(e.target.value)}
                                        />
                                    </div>
                                    <div className="grid grid-cols-1 gap-2 max-h-[400px] md:max-h-[calc(100vh-250px)] overflow-y-auto custom-scrollbar pr-2">
                                        {products.filter(p => p.name.toLowerCase().includes(search.toLowerCase())).map(p => {
                                            const av = (p.currentQuantity || 0) - getCartCount(p.firebaseId);
                                            return (
                                                <button 
                                                    key={p.firebaseId} 
                                                    disabled={av <= 0}
                                                    onClick={() => setCart([...cart, p])}
                                                    className={`p-4 rounded-2xl border flex justify-between items-center transition-all ${av > 0 ? 'bg-zinc-900/50 border-white/5 hover:border-[#c2ff59]/40 active:scale-[0.98]' : 'bg-zinc-900/20 border-white/5 opacity-40'}`}
                                                >
                                                    <div className="text-left">
                                                        <div className="text-[10px] font-black uppercase tracking-tight">{p.name}</div>
                                                        <div className="text-[8px] opacity-30 font-bold">{p.code}</div>
                                                    </div>
                                                    <div className={`text-xs font-black ${av <= 0 ? 'text-red-500' : 'text-[#c2ff59]'}`}>{av}</div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="flex flex-col space-y-6 sticky-form top-24 h-fit">
                                    <div className="bg-zinc-900/80 border border-white/5 rounded-[2.5rem] p-6 md:p-8 space-y-6 shadow-xl">
                                        <div className="space-y-4">
                                            <input 
                                                placeholder="NOME DO PROJETO" 
                                                className="w-full bg-black/40 border border-white/10 p-4 rounded-2xl text-[10px] font-black uppercase outline-none focus:border-[#c2ff59]"
                                                value={orderData.projeto}
                                                onChange={e => setOrderData({...orderData, projeto: e.target.value})}
                                            />
                                            <input 
                                                placeholder="QUEM ESTÁ RETIRANDO?" 
                                                className="w-full bg-black/40 border border-white/10 p-4 rounded-2xl text-[10px] font-black uppercase outline-none focus:border-[#c2ff59]"
                                                value={orderData.responsavel}
                                                onChange={e => setOrderData({...orderData, responsavel: e.target.value})}
                                            />
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="text-[7px] font-black opacity-30 uppercase ml-2 mb-1 block">Saída</label>
                                                    <input type="date" className="w-full bg-black/40 border border-white/10 p-4 rounded-2xl text-[10px] font-black outline-none" value={orderData.dataRetirada} onChange={e => setOrderData({...orderData, dataRetirada: e.target.value})} />
                                                </div>
                                                <div>
                                                    <label className="text-[7px] font-black opacity-30 uppercase ml-2 mb-1 block">Previsão Volta</label>
                                                    <input type="date" className="w-full bg-black/40 border border-white/10 p-4 rounded-2xl text-[10px] font-black outline-none" value={orderData.dataVolta} onChange={e => setOrderData({...orderData, dataVolta: e.target.value})} />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="pt-4 border-t border-white/5 max-h-[150px] overflow-y-auto custom-scrollbar">
                                            <div className="text-[9px] font-black opacity-30 mb-4 uppercase">Itens Selecionados ({cart.length})</div>
                                            <div className="space-y-2">
                                                {cart.map((c, i) => (
                                                    <div key={i} className="flex justify-between items-center bg-black/20 p-3 rounded-xl">
                                                        <span className="text-[9px] font-black uppercase truncate mr-4">{c.name}</span>
                                                        <button onClick={() => setCart(cart.filter((_, idx) => idx !== i))} className="text-red-500/40 hover:text-red-500 p-1"><Icons.Trash /></button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <button 
                                            onClick={handleFinalize}
                                            disabled={!cart.length || !orderData.projeto || !orderData.responsavel}
                                            className="w-full bg-[#c2ff59] text-black py-4 rounded-2xl font-black uppercase text-[11px] shadow-lg shadow-[#c2ff59]/10 active:scale-95 transition-all disabled:opacity-20"
                                        >
                                            Confirmar Saída
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'historico' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {history.map(h => (
                                    <div key={h.firebaseId} className="bg-zinc-900/60 p-6 rounded-[2rem] border border-white/5 flex flex-col justify-between hover:bg-zinc-900 transition-all group">
                                        <div>
                                            <div className="flex justify-between items-start mb-4">
                                                <div className="font-black text-[#c2ff59] uppercase text-sm leading-tight group-hover:tracking-wider transition-all">{h.projeto}</div>
                                                <div className="text-[8px] font-black opacity-30">{h.dataRegistro}</div>
                                            </div>
                                            <div className="text-[9px] font-bold opacity-50 uppercase mb-4 space-y-1">
                                                <div className="flex items-center gap-2">RESP: {h.responsavel}</div>
                                                <div>VOLTA: {formatDate(h.dataVolta)}</div>
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => generatePDF(h)} className="flex-1 bg-white/5 p-3 rounded-xl text-[9px] font-black uppercase flex items-center justify-center gap-2 hover:bg-white/10 transition-colors">
                                                <Icons.Download /> Gerar PDF
                                            </button>
                                            {!h.concluido && (
                                                <button 
                                                    onClick={async () => {
                                                        if(!confirm('Deseja confirmar o retorno desses equipamentos ao estoque?')) return;
                                                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('history').doc(h.firebaseId).update({ concluido: true });
                                                        for(const item of h.items) {
                                                            const p = products.find(prod => prod.code === item.code);
                                                            if(p) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('inventory').doc(p.firebaseId).update({ currentQuantity: (p.currentQuantity || 0) + 1 });
                                                        }
                                                    }}
                                                    className="flex-1 bg-[#c2ff59] text-black p-3 rounded-xl text-[9px] font-black uppercase hover:brightness-110 transition-all"
                                                >
                                                    Dar Baixa
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'estoque' && (
                            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
                                {products.map(p => (
                                    <div key={p.firebaseId} className="bg-zinc-900/40 p-4 rounded-3xl border border-white/5 flex flex-col justify-between">
                                        <div className="text-[9px] font-black uppercase tracking-tight leading-tight mb-4">{p.name}</div>
                                        <div className="flex justify-between items-end">
                                            <div className="text-[7px] font-black opacity-20 uppercase">Saldo</div>
                                            <div className="text-xs font-black text-[#c2ff59]">{p.currentQuantity}/{p.totalQuantity}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="md:hidden fixed bottom-0 left-0 right-0 glass-panel border-t border-white/5 px-8 py-4 flex justify-between items-center z-[100]">
                        <button onClick={() => setView('retirada')} className={`flex flex-col items-center gap-1 ${view === 'retirada' ? 'active-tab-mobile' : 'opacity-30'}`}>
                            <Icons.Plus />
                            <span className="text-[8px] font-black uppercase">Saída</span>
                        </button>
                        <button onClick={() => setView('historico')} className={`flex flex-col items-center gap-1 ${view === 'historico' ? 'active-tab-mobile' : 'opacity-30'}`}>
                            <Icons.History />
                            <span className="text-[8px] font-black uppercase">Docs</span>
                        </button>
                        <button onClick={() => setView('estoque')} className={`flex flex-col items-center gap-1 ${view === 'estoque' ? 'active-tab-mobile' : 'opacity-30'}`}>
                            <Icons.Box />
                            <span className="text-[8px] font-black uppercase">Saldo</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
